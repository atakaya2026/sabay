<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <title>PC សប្បាយក</title>
  <style>
    body {
      font-family: "Noto Sans KR", sans-serif;
      margin: 0;
      padding: 0 0 80px 0; /* ← 아래쪽에 60px 여백 */
      background: #fff;
      color: #222;
    }
    h1 {
      font-size: 3em;
	  margin-top: 30px;
	  margin-left: 80px;
      margin-bottom: 20px;
    }
    .container {
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }
    .text {
      flex: 1;
      line-height: 1.7;
	  margin-left: 80px;
      font-size: 1.3em;
    }
    .illustration {
      flex: 1;
    }
    .illustration img {
		width: 100%;
		max-width: 500px;
		border-radius: 6px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.1);
		margin-top: 24px;  /* 원하는 만큼 내려줌 */
		margin-left: 15px
}
    /* ── 버튼 래퍼 ── */
    .buttons {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      gap: 80px;
    }

    /* 단계 뱃지 + 버튼을 세로로 묶는 컨테이너 */
    .btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Step 뱃지 */
    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15em;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 6px 20px;
      border-radius: 999px;
      color: #fff;
    }
    .step-badge.green { background: #4a9e28; }
    .step-badge.blue  { background: #2a52a0; }

    .step-badge .step-num {
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1em;
      font-weight: 900;
    }
    .btn {
      display: flex;
      align-items: center;
	  width: 320px;   /* 원하는 고정값으로 */
	  height: 120px;
	  justify-content: center;
      gap: 10px;
      padding: 18px 28px;
      font-size: 1.6em;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      color: #fff;
    }
    .btn img {
      height: 36px;
    }
    .btn-green {
      background: #6cbc43;
    }
    .btn-blue {
      background: #3f6fb8;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
<button onclick="location.href='index.html'" 
        style="position: fixed; top: 20px; right: 78px; 
               padding: 10px 18px; font-size: 1.1em; 
               background-color: #3f6fb8; color: #fff; 
               border: none; border-radius: 8px; cursor: pointer; 
               box-shadow: 0 2px 6px rgba(0,0,0,0.15);
               z-index: 9999;">
  Home
</button>



  <h1>បទពិសោធន៍ PC សប្បាយក</h1>
  <div class="container">
    <div class="text">
      <p>សូមស្វាគមន៍យ៉ាងកក់ក្តៅមកកាន់មន្ទីរពិសោធន៍ សប្បាយក។</p>
      <p>
        ក្នុង PC សប្បាយក មានប្លង់ក្តារចុច (Keymap) នៅលើអេក្រង់ដើម្បីមើល និងវាយអត្ថបទបាន។<br>
នៅពេលស្ទាត់ជំនាញហើយ អ្នកអាចលាក់ Keymap បាន។
      </p>
      <p>
        មិនពិបាកទាល់តែសោះ។<br>ហាត់ទីតាំងម្រាមដៃមុនជាមួយហ្គេមវាយសត្វកណ្តុរដី (Mole Game)។
      </p>
    </div>
    <div class="illustration">
      <img src="images/trypc.png" alt="미니 맵 체험 삽화">
    </div>
  </div>
  <div class="buttons">
  <!-- 두더지 게임 버튼 -->
    <div class="btn-wrapper">
      <div class="step-badge green">
        Step 1
      </div>
      <button class="btn btn-green" onclick="location.href='mole.html'">
        <img src="img/icon_mole.png" alt="두더지 게임 아이콘">
        លេងហ្គេមវាយសត្វកណ្តុរដីមុន។
      </button>
    </div>

    <!-- 2단계: hatabang 체험 -->
    <div class="btn-wrapper">
      <div class="step-badge blue">
        Step 2
      </div>
      <button class="btn btn-blue" onclick="location.href='pc_demo_windows.html'">
        <img src="img/icon_keyboard.png" alt="키보드 아이콘">
        PC សប្បាយក<br>(សម្រាប់ PC តែប៉ុណ្ណោះ)
      </button>
    </div>
</div>




</body>
</html>
