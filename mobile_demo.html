<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Buakey Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #6b7280; font-family: 'Noto Sans Thai', sans-serif;
    display: flex; justify-content: center; align-items: flex-end; overflow: hidden;
  }
  #phone-wrap {
    width: min(100%, 480px); height: 100%; max-height: 900px;
    display: flex; flex-direction: column; background: #e8e4dc;
    box-shadow: 0 -5px 40px rgba(0,0,0,0.5); position: relative;
  }
  #action-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: #2d3748; border-bottom: 2px solid #ed8936;
  }
  #action-bar .title { color: #ed8936; font-size: 15px; font-weight: bold; }
  .reset-btn { padding: 5px 12px; background: #4a5568; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  #editor {
    flex: 1; width: 100%; background: #faf7f2; padding: 20px;
    font-size: 32px; line-height: 1.6; border: none; outline: none;
    white-space: pre-wrap; word-break: break-all; overflow-y: auto;
  }
  .cursor { color: #ed8936; animation: blink 1s step-end infinite; }
  @keyframes blink { from, to { opacity: 0; } 50% { opacity: 1; } }

  #keyboard-wrap { position: relative; width: 100%; background: #b5b0a8; line-height: 0; }
  #kbd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .key-btn {
    position: absolute; background: transparent; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  
  #space-display {
    font-size: 32px; 
    color: #744210; 
    font-weight: bold; 
    pointer-events: none;
    letter-spacing: -2px;
  }
</style>
</head>
<body>

<div id="phone-wrap">
  <div id="action-bar">
    <span class="title">Buakey</span>
    <button class="reset-btn" onclick="resetAll()">↺ Clear</button>
  </div>
  <div id="editor"></div>
  <div id="keyboard-wrap">
    <img src="images/keyboard.png" style="width:100%; display:block; pointer-events:none;">
    <div id="kbd-overlay"></div>
  </div>
</div>

<script>
const consonantGroups = {
  'ค': ['ค','ศ','ฅ'], 'ร': ['ร','ธ'], 'ว': ['ว','จ','ฐ','ฉ'], 'ก': ['ก','ถ','ฤ'], 'ภ': ['ภ','ฎ','ฏ'],
  'ม': ['ม','ฆ'], 'ห': ['ห','ท','ฑ'], 'น': ['น','บ','ป','ษ'], 'ง': ['ง', 'ย'], 'พ': ['พ','ผ','ฟ','ฝ','ฬ'],
  'ข': ['ข','ช','ซ','ฃ'], 'ล': ['ล','ส'], 'อ': ['อ','ฮ'], 'ด': ['ด','ต','ฒ'],  'ญ': ['ญ','ณ','ฌ']
};

const COLS = [1.0, 12.1, 23.2, 34.3, 45.4, 56.5, 67.6, 78.7, 89.8]; 
const ROWS = [3.0, 28.5, 51.8, 76.9]; 
const KW = 10.1; 
const KH = 21.0; 

let state = { text: '', activeBase: null, activeIdx: 0, lastVowelKey: null, vowelIdx: 0 };
const editor = document.getElementById('editor');
const overlay = document.getElementById('kbd-overlay');

function updateDisplay() {
  editor.innerHTML = state.text + '<span class="cursor">|</span>';
  editor.scrollTop = editor.scrollHeight;
  renderKeys();
}

function handleConsonant(char) {
  state.activeBase = char;
  state.activeIdx = 0;
  state.lastVowelKey = null;
  state.vowelIdx = 0;
  state.text += char;
  updateDisplay();
}

function handlePlus() {
  if (!state.activeBase) return;
  const group = consonantGroups[state.activeBase];
  if (!group || group.length <= 1) return;
  state.activeIdx = (state.activeIdx + 1) % group.length;
  state.text = state.text.slice(0, -1) + group[state.activeIdx];
  updateDisplay();
}

function handleVowel(keyId, chars) {
  if (state.lastVowelKey === keyId) {
    state.vowelIdx = (state.vowelIdx + 1) % chars.length;
    state.text = state.text.slice(0, -1) + chars[state.vowelIdx];
  } else {
    state.lastVowelKey = keyId;
    state.vowelIdx = 0;
    state.text += chars[0];
  }
  state.activeBase = null; // 모음 입력 시 자음 가획 상태 해제
  updateDisplay();
}

function resetAll() {
  state = { text: '', activeBase: null, activeIdx: 0, lastVowelKey: null, vowelIdx: 0 };
  updateDisplay();
}

function renderKeys() {
  overlay.innerHTML = '';
  
  const layout = [
    ['ค','ร','ว','ก','ภ', ['ั','็','์'], ['ิ','ึ'], ['ี','ื'], ['่','้','๊','๋']],
	['ม','ห','น','ง','พ', ['ไ','ใ','โ'], ['เ','แ'], ['า','ำ'], 'ะ'],
	['ข','ล','อ','ด','ญ', 'SPACE_STAR', ['ู','ุ'], ['ๆ','ฯ'], 'BS']
  ];

  layout.forEach((row, rIdx) => {
    row.forEach((key, cIdx) => {
      if (!key) return;
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.style.left = COLS[cIdx] + '%';
      btn.style.top = ROWS[rIdx] + '%';
      btn.style.width = KW + '%';
      btn.style.height = KH + '%';

      if (key === 'SPACE_STAR') {
        btn.onclick = () => { 
            state.text += ' '; 
            state.activeBase = null; 
            state.lastVowelKey = null; 
            updateDisplay(); 
        };
      } else if (key === 'BS') {
        btn.onclick = () => { 
            state.text = state.text.slice(0, -1); 
            state.activeBase = null; 
            state.lastVowelKey = null; 
            updateDisplay(); 
        };
      } else if (key === 'ะ') {
        // 'ะ' 단독 처리 (모음으로 인식시켜 자음 상태 해제)
        btn.onclick = () => handleVowel('key_ะ', ['ะ']);
      } else if (Array.isArray(key)) {
        btn.onclick = () => handleVowel(`r${rIdx}c${cIdx}`, key);
      } else {
        btn.onclick = () => handleConsonant(key);
      }
      overlay.appendChild(btn);
    });
  });

  const space = document.createElement('button');
  space.className = 'key-btn';
  space.style.cssText = `left:23.2%; top:${ROWS[3]}%; width:53.3%; height:20%;`;
  
  if (state.activeBase) {
    const group = consonantGroups[state.activeBase].slice(1);
    if (group.length > 0) {
      space.innerHTML = `<div id="space-display">${group.join('')}</div>`;
    } else {
      space.innerHTML = `<div id="space-display">+</div>`;
    }
  } else {
    space.innerHTML = `<div id="space-display">+</div>`;
  }
  
  space.onclick = handlePlus;
  overlay.appendChild(space);

  const numBtn = document.createElement('button');
  numBtn.className = 'key-btn';
  numBtn.style.cssText = `left:1.0%; top:${ROWS[3]}%; width:21.2%; height:20%;`;
  overlay.appendChild(numBtn);

  const enter = document.createElement('button');
  enter.className = 'key-btn';
  enter.style.cssText = `left:77.5%; top:${ROWS[3]}%; width:21.5%; height:20%;`;
  enter.onclick = () => { 
    state.text += '\n'; 
    state.activeBase = null; 
    state.lastVowelKey = null;
    updateDisplay(); 
  };
  overlay.appendChild(enter);
}

updateDisplay();
</script>
</body>
</html>
